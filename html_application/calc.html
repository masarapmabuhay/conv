	//added by Mike, 20260515
	function initKeyboardInput() {
		var bIsShiftKeyPressed = false;
		
		document.body.onkeydown = function(e) {
			//alert("e.keyCode: "+e.keyCode);

			if ((!bIsShiftKeyPressed) && (e.keyCode==61)) { //key = without SHIFT
				document.getElementById("buttonEqualsId").click();
			}
			else if ((bIsShiftKeyPressed) && (e.keyCode==61)) { //key SHIFT and +
				document.getElementById("buttonPlusId").click();
			}
			//edited by Mike, 20260516
			//else if ((bIsShiftKeyPressed) && (e.keyCode==173)) { //key SHIFT and -
			else if (e.keyCode==173) { //key - (near top of keyboard)
				document.getElementById("buttonMinusId").click();
			}
			//put this here, before checking only "e.keyCode==56"
			else if ((bIsShiftKeyPressed) && (e.keyCode==56)) { //key SHIFT and *
				document.getElementById("buttonMultiplyId").click();
			}
			else if ((e.keyCode==103) || (e.keyCode==55)) { //key 7 (near numlock or top)
				document.getElementById("buttonSevenId").click();
			}
			else if ((e.keyCode==104) || (e.keyCode==56)) { //key 8 (near numlock or top)
				document.getElementById("buttonEightId").click();
			}
			else if ((e.keyCode==105) || (e.keyCode==57)) { //key 9 (near numlock or top)
				document.getElementById("buttonNineId").click();
			}
			else if ((e.keyCode==100) || (e.keyCode==52)) { //key 4 (near numlock or top)
				document.getElementById("buttonFourId").click();
			}
			else if ((e.keyCode==101) || (e.keyCode==53)) { //key 5 (near numlock or top)
				document.getElementById("buttonFiveId").click();
			}
			else if ((e.keyCode==102) || (e.keyCode==54)) { //key 6 (near numlock or top)
				document.getElementById("buttonSixId").click();
			}
			else if ((e.keyCode==97) || (e.keyCode==49)) { //key 1 (near numlock or top)
				document.getElementById("buttonOneId").click();
			}
			else if ((e.keyCode==98) || (e.keyCode==50)) { //key 2 (near numlock or top)
				document.getElementById("buttonTwoId").click();
			}
			else if ((e.keyCode==99) || (e.keyCode==51)) { //key 3 (near numlock or top)
				document.getElementById("buttonThreeId").click();
			}
			else if ((e.keyCode==96) || (e.keyCode==48)) { //key 0 (near numlock or top)
				document.getElementById("buttonZeroId").click();
			}
			else if ((e.keyCode==110) || (e.keyCode==190)) { //key . (near numlock or bottom)
				document.getElementById("buttonDotId").click();
			}
			else if (e.keyCode==8) { //key Backspace
				document.getElementById("backspaceButtonId").click();
			}
			else if (e.keyCode==107) { //key PLUS
				document.getElementById("buttonPlusId").click();
			}
			else if (e.keyCode==106) { //key MULTIPLY
				document.getElementById("buttonMultiplyId").click();
			}
			else if (e.keyCode==109) { //key MINUS
				document.getElementById("buttonMinusId").click();
			}
			//else if (e.keyCode==111) { //key DIVIDE
			else if ((e.keyCode==111) || (e.keyCode==191)) { //key . (near numlock or bottom)
				document.getElementById("buttonDivideId").click();
			}
			else if (e.keyCode==13) { //key Enter (same for either near numlock or top)
				document.getElementById("buttonEqualsId").click();
			}
			else if (e.keyCode==27) { //key Escape
				document.getElementById("buttonEqualsId").click();
			}
			else if (e.keyCode==16) { //key SHIFT
				bIsShiftKeyPressed = true;
			}

		};

		document.body.onkeyup = function(e) {
			//alert("KEYUP; e.keyCode: "+e.keyCode);

			if (e.keyCode==16) { //key SHIFT
				bIsShiftKeyPressed = false;
			}
		};
	}
