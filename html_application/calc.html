	//added by Mike, 20260515
	function initKeyboardInput() {
		var bIsShiftKeyPressed = false;
		
		document.body.onkeydown = function(e) {
			//alert("e.keyCode: "+e.keyCode);

			if ((!bIsShiftKeyPressed) && (e.keyCode==61)) { //key = without SHIFT
				document.getElementById("buttonEqualsId").click();
			}
			else if ((bIsShiftKeyPressed) && (e.keyCode==61)) { //key SHIFT and +
				document.getElementById("buttonPlusId").click();
			}
			//edited by Mike, 20260516
			else if (e.keyCode==173) { //key - (near top of keyboard)
				document.getElementById("buttonMinusId").click();
			}
			//put this here, before checking only "e.keyCode==56"
			else if ((bIsShiftKeyPressed) && (e.keyCode==56)) { //key SHIFT and *
				document.getElementById("buttonMultiplyId").click();
			}
			else if ((e.keyCode==103) || (e.keyCode==55)) { //key 7 (near numlock or top)
				document.getElementById("buttonSevenId").click();
			}
			else if ((e.keyCode==104) || (e.keyCode==56)) { //key 8 (near numlock or top)
				document.getElementById("buttonEightId").click();
			}
			else if ((e.keyCode==105) || (e.keyCode==57)) { //key 9 (near numlock or top)
				document.getElementById("buttonNineId").click();
			}
			else if ((e.keyCode==100) || (e.keyCode==52)) { //key 4 (near numlock or top)
				document.getElementById("buttonFourId").click();
			}
			else if ((e.keyCode==101) || (e.keyCode==53)) { //key 5 (near numlock or top)
				document.getElementById("buttonFiveId").click();
			}
			else if ((e.keyCode==102) || (e.keyCode==54)) { //key 6 (near numlock or top)
				document.getElementById("buttonSixId").click();
			}
			else if ((e.keyCode==97) || (e.keyCode==49)) { //key 1 (near numlock or top)
				document.getElementById("buttonOneId").click();
			}
			else if ((e.keyCode==98) || (e.keyCode==50)) { //key 2 (near numlock or top)
				document.getElementById("buttonTwoId").click();
			}
			else if ((e.keyCode==99) || (e.keyCode==51)) { //key 3 (near numlock or top)
				document.getElementById("buttonThreeId").click();
			}
			else if ((e.keyCode==96) || (e.keyCode==48)) { //key 0 (near numlock or top)
				document.getElementById("buttonZeroId").click();
			}
			else if ((e.keyCode==110) || (e.keyCode==190)) { //key . (near numlock or bottom)
				document.getElementById("buttonDotId").click();
			}
			else if (e.keyCode==8) { //key Backspace
				document.getElementById("backspaceButtonId").click();
			}
			else if (e.keyCode==107) { //key PLUS
				document.getElementById("buttonPlusId").click();
			}
			else if (e.keyCode==106) { //key MULTIPLY
				document.getElementById("buttonMultiplyId").click();
			}
			else if (e.keyCode==109) { //key MINUS
				document.getElementById("buttonMinusId").click();
			}
			//else if (e.keyCode==111) { //key DIVIDE
			else if ((e.keyCode==111) || (e.keyCode==191)) { //key . (near numlock or bottom)
				document.getElementById("buttonDivideId").click();
			}
			else if (e.keyCode==13) { //key Enter (same for either near numlock or top)
				document.getElementById("buttonEqualsId").click();
			}
			else if (e.keyCode==27) { //key Escape
				reset(); //added by Mike, 20260518
				document.getElementById("buttonEqualsId").click();
			}
			else if (e.keyCode==16) { //key SHIFT
				bIsShiftKeyPressed = true;
			}

		};

		document.body.onkeyup = function(e) {
			//alert("KEYUP; e.keyCode: "+e.keyCode);

			if (e.keyCode==16) { //key SHIFT
				bIsShiftKeyPressed = false;
			}
		};
	}

	function isOperator(sInput) {

		if (sInput.includes("×")) { //*

		}
		else if (sInput.includes("+")) {
			return true;	
		}
		else if (sInput.includes("-")) {

		}
		else if (sInput.includes("÷")) {

		}
		else if (sInput.includes("(")) {
			return true;	
		}
		else if (sInput.includes(")")) {

		}

		//alert("END!!");
		
		return false;	
	}

	function backspace() {
		var answerInput = document.getElementById("answerInputId");
		var backspaceButton = document.getElementById("backspaceButtonId");
		
		//added by Mike, 20260516
		answerInput.focus();

		//added by Mike, 20260430
		if (backspaceButton.innerHTML.includes("CLEAR")) {
			reset();
			backspaceButton.innerHTML = "BACK<br/>SPACE"; //"BACK<br/>SPACE";
		}
		//added by Mike, 20260501
		else {
			if (answerInput.value.length==0) {
				reset();
			}
			//added by Mike, 20260502
			//else { 
			else if ((answerInput.value.length==1) && (answerInput.value.at(-1)=="-")) {
				reset();
			}
		}
				
		//added by Mike, 20260430
		//caution; sCurrOperand might be a float, instead of a string; 
		//sCurrOperand=sCurrOperand.toString();
		
		//added by Mike, 20260430
		if (answerInput.value.length==0) {
			//alert("ZERO!!");
			return;
		}		
		
		if (isOperator(answerInput.value.at(-1))) {
			if (isOperator(answerInput.value.at(-2))) {
				if (arrayOperator.length>0) {
					sCurrOperand = answerInput.value.substring(0,answerInput.value.length-2);
				}

				answerInput.value = sCurrOperand.concat(arrayOperator.at(-1));

				//added by Mike, 20260504
				if (!arrayOperator.at(-1).includes(sCurrOperand)) {
					sCurrOperand = "";
				}
			}
			else {
				if (arrayOperator.length>0) {	
					arrayOperator.pop();

					sCurrOperand = answerInput.value.substring(0,answerInput.value.length-1);
				}

				answerInput.value = sCurrOperand;
			}
		}
		else {
			sCurrDigit = answerInput.value.substring(answerInput.value.length-1,answerInput.value.length);
			
			sCurrAnswerInput = answerInput.value;

			//not empty
			if (arrayOperand.length>0) {
				sCurrOperandInArray = arrayOperand.at(-1).toString();
				
				if (sCurrOperandInArray==sCurrDigit) {
					arrayOperand.pop();
				}
				else {
					//check first if sCurrAnswerInput has some digits not in the operand array
					
					sCurrOperandInAnswerInput = "";
					
					if ((arrayOperator.length > 0) && (arrayOperator.at(-1)!=="=")) {
						sCurrOperandInAnswerInput=sCurrAnswerInput.slice(-sCurrAnswerInput.lastIndexOf(arrayOperator.at(-1)))
					}

					if (sCurrOperandInAnswerInput.length > 0) {
						//OK
					}
					//if none, remove the last digit of the last element in the operand array
					else {
						sCurrOperand = arrayOperand.pop().toString();

						arrayOperand.push(sCurrOperandInArray.substring(0,sCurrOperandInArray.length-1));
					}
				}
			}

			sCurrOperand = sCurrOperand.substring(0,sCurrOperand.length-1);

			sCurrAnswerInput = answerInput.value.substring(0,answerInput.value.length-1);
			
			answerInput.value = sCurrAnswerInput;
		}		
	}
  
	function inputDigit(digit) {
		var answerInput = document.getElementById("answerInputId");
		var backspaceButton = document.getElementById("backspaceButtonId");
		
		//added by Mike, 20260516
		answerInput.focus();
		
		//added by Mike, 20260430
		if (backspaceButton.innerHTML.includes("CLEAR")) {
			//reset();
			backspaceButton.innerHTML = "BACK<br/>SPACE";

			//added by Mike, 20260502
			if (answerInput.value=="0") {
				reset();
			}
		}

		//added by Mike, 20260430
		//only one "." can be added
		if ((digit==".") && (sCurrOperand.includes("."))) {
			return;
		}
		
		if (arrayOperator.at(-1)=="=") { //peek last element
			reset();
		}

		if (answerInput.value.length>14) {
			//max 15 operands and operators including the decimal point 
			return;
		}
		
		sCurrOperand=sCurrOperand.concat(digit);
		
		answerInput.value=answerInput.value.concat(digit);
	}

		sCurrOperand = "";
		arrayOperator.pop();
		answerInput.value = "";
		arrayOperator = [];
		arrayOperand = [];

		//added by Mike, 20260501
		arrayOperatorTemp = [];
		arrayOperandTemp = [];
	}
	
	//added by Mike, 20260513
	function getPlacesAfterDecimalPoint(fInput) {
		sInput = fInput.toString();
		
		if (sInput.includes(".")) {
			return sInput.substring(sInput.indexOf(".")+1).length;
		}
		
		return 0;
	}
	
	function inputOperator(sOperator) {
		var answerInput = document.getElementById("answerInputId");
		var backspaceButton = document.getElementById("backspaceButtonId");
		
		//added by Mike, 20260516
		answerInput.focus();
				
		//added by Mike, 20260430
		if (backspaceButton.innerHTML.includes("CLEAR")) {
			
			backspaceButton.innerHTML = "BACK<br/>SPACE";

			//edited by Mike, 20260516; from 20260515
			//if (sOperator.at(-1)=="=") {
			if (sOperator=="=") {
				if (!hasOperator(arrayOperator)) {
					reset();
					return;
				}
			}
		}
		
		//added by Mike, 20260516
		if (answerInput.value.length>14) {
			//max 15 operands and operators including the decimal point 
			//unless it's = sign
			
			//alert(sOperator);
			
			if (sOperator!="=") {
				return;
			}
		}

		//added by Mike, 20260429
		//enter an operand first
		if (arrayOperand.length==0) {
			if (answerInput.value.length==0) {
			
				if (sOperator.at(-1)=="-") {
					inputDigit("-");
				}
			
				return;
			}
		}
		//added by Mike, 20260502
		else {
			if (sOperator.at(-1)=="-") {
				if ((answerInput.value.at(-1)=="×") || (answerInput.value.at(-1)=="÷")) {
					inputDigit("-");
					
					return;
				}
			}
		}
		
		//added by Mike, 20260501
		if (arrayOperator.length>0) {
			//edited by Mike, 20260502
			if (arrayOperator.at(-1)=="=") {
				if (!isOperator(answerInput.value.toString())) {
					arrayOperator = [];
					arrayOperator.push("=");
				}
			}
		}
		
		//added by Mike, 20260430
		if ((arrayOperand.length==1) && (arrayOperand.at(-1)==".")) { //peek last element
			if ((answerInput.value.length==1) && (answerInput.value.at(-1)==".")) { //peek last element
				return;
			}
		}

		if (answerInput.value.includes("Err")) {
			reset();
			
			return;
		}	
		
		//TODO: -update: to use PEMDAS
		if (!sOperator.includes("=")) {
			//if not empty
			if (arrayOperand.length>0) {
				if (arrayOperator.at(-1)=="=") { //peek last element
					arrayOperator.pop();
				}
				//note can be used to change the current operator
				else {
					if ((answerInput.value.at(-1)=="×") || (answerInput.value.at(-1)=="÷") || (answerInput.value.at(-1)=="+") || (answerInput.value.at(-1)=="-")) {

						let sCurrOperatorTemp = arrayOperator.pop().toString();

						if (sCurrOperatorTemp.includes(answerInput.value.at(-1))) {
							answerInput.value = answerInput.value.substring(0,answerInput.value.length-1);
						}
						else {
							answerInput.value = answerInput.value.substring(0,answerInput.value.length-2);
						}
												
						sCurrOperand=arrayOperand.at(-1);
					}
					//added by Mike, 20260510; from 20260502					
					else {
						//only one operator allowed
						//due to 9/3*2; error where 9/(3*2) is done instead of (9/3)*2
						if (arrayOperator.length>0) {
							//set this here due to 3*3-B2=error; without the following:
							//arrayOperand.push(parseFloat(sCurrOperand));
							//although it's only needed if the user presses backspace

							//edited by Mike, 20260518
							inputOperator("=");
							inputOperator(sOperator);
							
							return;
						}
					}
				}
			}
		}
		
		arrayOperand.push(parseFloat(sCurrOperand));
		sCurrOperand="";		
		
		if (sOperator.includes("=")) {
			var operandOne = "";
			var operandTwo = "";
			var sCurrOperator = "";

			if (arrayOperand.length>0) {
				operandOne = arrayOperand.pop();
			}

			if (arrayOperand.length>0) {
				operandTwo = arrayOperand.pop();
			}
			
			if (arrayOperator.length>0) {
				sCurrOperator = arrayOperator.pop();
			}

			var sAnswer = "";
			var fAnswer = 0.0;

			if (sCurrOperator.includes("×")) {
				//added by Mike, 20260505
				if (arrayOperator.at(-1)=="-") {
					operandTwo=-operandTwo;
					arrayOperator.pop();
					arrayOperator.push("+");
				}

				//edited by Mike, 20260513; from 20260512
				fAnswer = parseFloat(operandOne)*parseFloat(operandTwo);

/*
				//check: how many decimal places after the decimal point; 
				//therefore, 1.12 should be multiplied by 100
				//1.123 should be multiplied by 1000
				fAnswer = (operandOne*100)*(operandTwo*100);
				fAnswer = (fAnswer/10000);
*/
				var iPlacesAfterDecimalPoint = getPlacesAfterDecimalPoint(fAnswer);
				var iPowerOfTen = 10 ** iPlacesAfterDecimalPoint;

				fAnswer = (operandOne*iPowerOfTen)*(operandTwo*iPowerOfTen);
				fAnswer = (fAnswer/(iPowerOfTen*iPowerOfTen));
				
				sAnswer = fAnswer.toString();
								
				sCurrOperand=sAnswer;
				arrayOperand.push(sCurrOperand);

				if ((arrayOperator.includes("×")) || (arrayOperator.includes("÷")) ) {
					arrayOperand.pop();
					inputOperator("=");

					return;
				}				
				
				while (arrayOperatorTemp.length>0) {
					arrayOperator.push(arrayOperatorTemp.pop());
				}

				while (arrayOperandTemp.length>0) {
					arrayOperand.push(arrayOperandTemp.pop());

					sCurrOperand=arrayOperand.at(-1);
				}
				
				arrayOperator.push("=");				
			}
			else if (sCurrOperator.includes("+")) {
				if ((arrayOperator.includes("×")) || (arrayOperator.includes("÷")) ) {
					arrayOperandTemp.push(operandOne);
					arrayOperatorTemp.push("+");
					
					sCurrOperand=operandTwo;
					inputOperator("=");
					
					return;
				}
				else {
					//added by Mike, 20260505
					if (arrayOperator.at(-1)=="-") {
						operandTwo=-operandTwo;
						arrayOperator.pop();
						arrayOperator.push("+");
					}				
				
					fAnswer = parseFloat(operandOne)+parseFloat(operandTwo);
					sAnswer = fAnswer.toString();
					sCurrOperand=sAnswer;
					arrayOperand.push(sCurrOperand);
					arrayOperator.push("=");
				}
			}
			else if (sCurrOperator.includes("-")) {
				if ((arrayOperator.includes("×")) || (arrayOperator.includes("÷")) ) {
					//note order of operands; reversed;
					arrayOperandTemp.push(-operandOne);
					arrayOperatorTemp.push("-");
					
					sCurrOperand=operandTwo;

					inputOperator("=");
					
					return;
				}
				else {
					//added by Mike, 20260505
					if (arrayOperator.at(-1)=="-") {
						operandTwo=-operandTwo;
						arrayOperator.pop();
						arrayOperator.push("+");
					}				
					
					//note order of operands; reversed;
					fAnswer = -parseFloat(operandOne)+parseFloat(operandTwo);
					sAnswer = fAnswer.toString();
					sCurrOperand=sAnswer;
					arrayOperand.push(sCurrOperand);
					
					//added by Mike, 20260505
					if (arrayOperatorTemp.length>0) {
						arrayOperator.push(arrayOperatorTemp.pop());

						if (arrayOperandTemp.length>0) {
							arrayOperand.push(arrayOperandTemp.pop());

							sCurrOperand=arrayOperand.at(-1);
						}
					}
				
					arrayOperator.push("=");
				}
			}
			else if (sCurrOperator.includes("÷")) {
				//added by Mike, 20260505
				if (arrayOperator.at(-1)=="-") {
					operandTwo=-operandTwo;
					arrayOperator.pop();
					arrayOperator.push("+");
				}

				//note order of operands; reversed;
				//fAnswer = parseFloat(operandOne)/parseFloat(operandTwo);

				//edited by Mike, 20260514; from 20260513
				//fAnswer = parseFloat(operandTwo)/parseFloat(operandOne);

				//AI Overview
				//The Integer "Cents" Trick
				//check: how many decimal places after the decimal point; 
				//fAnswer = (operandTwo*100).toFixed(2)/(operandOne*100).toFixed(2);
				//fAnswer = Math.round((operandTwo*100)/(operandOne*100));
				
				//note 1.12*100 becomes 112.00000000000001 
				//alert(operandOne*100);
				
				var iPlacesAfterDecimalPointOperandOne = getPlacesAfterDecimalPoint(operandOne);
				var iPlacesAfterDecimalPointOperandTwo = getPlacesAfterDecimalPoint(operandTwo);
				
				if (iPlacesAfterDecimalPointOperandOne>iPlacesAfterDecimalPointOperandTwo) {
					iPlacesAfterDecimalPoint = iPlacesAfterDecimalPointOperandOne;
				}
				else {
					iPlacesAfterDecimalPoint = iPlacesAfterDecimalPointOperandTwo;
				}

				var iPowerOfTen = 10 ** iPlacesAfterDecimalPoint;

				fAnswer = parseFloat(operandTwo*iPowerOfTen).toFixed(iPlacesAfterDecimalPoint)/parseFloat(operandOne*iPowerOfTen).toFixed(iPlacesAfterDecimalPoint);
				
				sAnswer = fAnswer.toString();
				sCurrOperand=sAnswer;
				arrayOperand.push(sCurrOperand);
				
				if ((arrayOperator.includes("×")) || (arrayOperator.includes("÷")) ) {
					arrayOperand.pop();
					
					inputOperator("=");

					return;
				}				
				
				while (arrayOperatorTemp.length>0) {
					arrayOperator.push(arrayOperatorTemp.pop());
				}

				while (arrayOperandTemp.length>0) {
					arrayOperand.push(arrayOperandTemp.pop());

					sCurrOperand=arrayOperand.at(-1);
				}
				
				arrayOperator.push("=");
			}
			//added by Mike, 20260502
			else {
				sAnswer = answerInput.value;	
				sCurrOperand=sAnswer;
				arrayOperand.push(sCurrOperand);
				arrayOperator.push("=");
			}
			
			//added by Mike, 20260430
			if (sAnswer.includes(".")) {
				//edited by Mike, 20260520
				//make sure that all the digits to the left of the decimal point 
				//are all in the answer; including the decimal point
				var sAnswerTemp=sAnswer.substring(0,sAnswer.indexOf(".")+1);
				
				//11 is the max; including the decimal point
				var iRemainingCharacters = 11-sAnswerTemp.length;

				if (iRemainingCharacters<=0) {
					sAnswer=sAnswerTemp;
				}
				else {
					//inclusive at the start only;
					sAnswer=sAnswerTemp.concat(sAnswer.substring(sAnswer.indexOf(".")+1,sAnswer.indexOf(".")+1+iRemainingCharacters));
				}

/*				
				//removed by Mike, 20260520
				//keep the decimal point;
				//as with the case: 7777777777/3;
				//ten 7's; results to "2592592592."
				//so update to be "2592592592"
				if (getPlacesAfterDecimalPoint(sAnswer)==0) {
					sAnswer=sAnswer.replace(".","");
				}
*/				
			}

			//edited by Mike, 20260502
			answerInput.value=sAnswer;	

			//added by Mike, 20260430
			backspaceButton.innerHTML = "CLEAR";
		}
		else {
			if (answerInput.value.at(-1)=="-") {
				arrayOperator.pop();
				answerInput.value=answerInput.value.substring(0,answerInput.value.length-1);
				reset();
			}
			else {
				arrayOperator.push(sOperator);
				answerInput.value=answerInput.value.concat(""+sOperator);
			}
		}
	
		if (answerInput.value.includes("NaN")) {
			reset();

			//NaN was caused by an operand whose value is only "."
			if ((Number.isNaN(operandOne)) || (Number.isNaN(operandTwo))) {
				answerInput.value = "0";
			}
			else {
				answerInput.value = "Err"; //Error
			}
		}
		//added by Mike, 20260502
		else if (answerInput.value.includes("Infinity")) {
			answerInput.value = "∞";
		}

		if (arrayOperator.includes("=")) {
			if ((arrayOperator.includes("+")) || (arrayOperator.includes("-"))) {
				arrayOperand.pop(); //remove the top-most operand that will be added again;
				
				arrayOperator.pop(); //remove the excess "=";
				inputOperator("=");
			}
		}
	}
  </script>

  <body id="myBodyId" onload="onLoad();" onclick="setFocusToAnswerInputText()">

	<canvas id="myCanvasId" class="myCanvas">
	</canvas>

	<div>

			<div>
				<button id="buttonSevenId" class="buttonDefaultLeftMostColumn" onclick="inputDigit(7)">7</button>
				<button id="buttonEightId" class="buttonDefault" onclick="inputDigit(8)">8</button>
				<button id="buttonNineId" class="buttonDefault" onclick="inputDigit(9)">9</button>
				<button id="buttonDivideId" class="buttonDefault" onclick="inputOperator('÷')">÷</button>

			<div>
				<button id="buttonFourId" class="buttonDefaultLeftMostColumn" onclick="inputDigit(4)">4</button>
				<button id="buttonFiveId" class="buttonDefault" onclick="inputDigit(5)">5</button>
				<button id="buttonSixId" class="buttonDefault" onclick="inputDigit(6)">6</button>
				<button id="buttonMultiplyId" class="buttonDefault" onclick="inputOperator('×')">×</button>
			</div>
			<div>
				<button id="buttonOneId" class="buttonDefaultLeftMostColumn" onclick="inputDigit(1)">1</button>
				<button id="buttonTwoId" class="buttonDefault" onclick="inputDigit(2)">2</button>
				<button id="buttonThreeId" class="buttonDefault" onclick="inputDigit(3)">3</button>

	</div>
  </body>
