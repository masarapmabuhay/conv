  <script>
	var sCurrOperand = "";
	var arrayOperand = [];
	var arrayOperator = [];
	//added by Mike, 20260501
	//for PEMDAS
	var arrayOperandTemp = []; 
	var arrayOperatorTemp = [];
	
	const fONE_KG_TO_ONE_POUND = 2.20462262;
	const fONE_FOOT_TO_ONE_CENTIMETER = 30.48;
	
	var fMultiplier = fONE_KG_TO_ONE_POUND;
	
	//Reference Google AI Overview
	function processSelectedUsageType(val) {
		//alert("VAL!!: "+val);

		var answerInputLeft = document.getElementById("answerInputLeftId");
		var answerInputRight = document.getElementById("answerInputRightId");
		
		var unitLabelLeft = document.getElementById("unitLabelLeftId");
		var unitLabelRight = document.getElementById("unitLabelRightId");
		
		answerInputLeft.value = "";
		answerInputRight.value = "";
		
		if (val.includes("Mass")) {
			unitLabelLeft.innerHTML = "Kilogram";
			unitLabelRight.innerHTML = "Pound (lbs)";
			
			fMultiplier = fONE_KG_TO_ONE_POUND;
		}
		else if (val.includes("Length")) {
			unitLabelLeft.innerHTML = "Foot";
			unitLabelRight.innerHTML = "Centimeter";

			fMultiplier = fONE_FOOT_TO_ONE_CENTIMETER;
		}
	}
	
	//added by Mike, 20260528
	function checkIsInputNumber(sInput, bIsLeft) {
		var answerInputLeft = document.getElementById("answerInputLeftId");
		var answerInputRight = document.getElementById("answerInputRightId");
		
		var iCount = 0;
		var iCountMax = sInput.length;
		
		for (iCount = 0; iCount < iCountMax; iCount++) {
			//alert(sInput.at(iCount));

			if (sInput.at(iCount).includes(".")) {
				continue;
			}

			if (Number.isNaN(Number(sInput.at(iCount)))) {
				if (bIsLeft) {
					answerInputLeft.value = answerInputLeft.value.replace(sInput.at(iCount), "");
					
					//alert(answerInputLeft.value.replace(sInput.at(iCount), ""));
				}
				else {
					answerInputRight.value = answerInputRight.value.replace(sInput.at(iCount), "");
				}
		
				//alert("sInput: "+sInput);
			}
		}
	}
	
	function processAnswerInputLeft() {
		var answerInputLeft = document.getElementById("answerInputLeftId");
		var answerInputRight = document.getElementById("answerInputRightId");
		
		answerInputLeft.value = answerInputLeft.value.trim();

		if (answerInputLeft.value.trim().length==0) {
			return
		}

		//added by Mike, 20260528
		if (answerInputLeft.value==".") {
			answerInputLeft.value = "0.";
		}	

		checkIsInputNumber(answerInputLeft.value, true);
				
		if (Number.isNaN(Number(answerInputLeft.value))) {
			//alert("NAN!!");

			answerInputLeft.value = answerInputLeft.value.substring(0,answerInputLeft.value.length-1);
		}
		else { //noted space accepted as a number; so do a trim before this 
			var fAnswerInputLeft = parseFloat(answerInputLeft.value);

			//alert(fAnswerInputLeft);
			//1 kg = approx 2.205 pounds
			//TODO: -update: toFixed(...)
			
			//edited by Mike, 20260528
			//answerInputRight.value = (fAnswerInputLeft*fONE_KG_TO_ONE_POUND).toFixed(4);
			answerInputRight.value = (fAnswerInputLeft*fMultiplier).toFixed(4);
			
			if (Number.isNaN(Number(answerInputRight.value))) {
				answerInputRight.value = "";
			}
		}
	}
	
	function processAnswerInputRight() {
		var answerInputLeft = document.getElementById("answerInputLeftId");
		var answerInputRight = document.getElementById("answerInputRightId");
		
		answerInputRight.value = answerInputRight.value.trim();

		if (answerInputRight.value.trim().length==0) {
			return
		}

		//added by Mike, 20260528
		if (answerInputLeft.value==".") {
			answerInputLeft.value = "0.";
		}	
		
		//added by Mike, 20260528
		checkIsInputNumber(answerInputRight.value, false);
		
		if (Number.isNaN(Number(answerInputRight.value))) {
			//alert("NAN!!");

			answerInputRight.value = answerInputRight.value.substring(0,answerInputRight.value.length-1);
		}
		else { //noted space accepted as a number; so do a trim before this 
			var fAnswerInputRight = parseFloat(answerInputRight.value);

			//alert(fAnswerInputLeft);
			//1 kg = approx 2.205 pounds
			//TODO: -update: toFixed(...)
			
			//edited by Mike, 20260528
			//answerInputLeft.value = (fAnswerInputRight/fONE_KG_TO_ONE_POUND).toFixed(4);
			answerInputLeft.value = (fAnswerInputRight/fMultiplier).toFixed(4);
			
			if (Number.isNaN(Number(answerInputLeft.value))) {
				answerInputLeft.value = "";
			}			
		}	
	}	

	//TODO -update: this
	function roundDecimalPointBUGGY(sInput) {
		if (sInput.includes(".")) {
			if (sInput.length>6) {
				return sInput.toFixed(sInput.length-getPlacesAfterDecimalPoint(parseFloat(sInput)));
			}
		}
	}
	
	function onLoad() {
		var answerInputLeft = document.getElementById("answerInputLeftId");
		answerInputLeft.value = "";

		var answerInputRight = document.getElementById("answerInputRightId");
		answerInputRight.value = "";
		
		var unitLabelLeft = document.getElementById("unitLabelLeftId");
		var unitLabelRight = document.getElementById("unitLabelRightId");
		var disclaimerLabel = document.getElementById("disclaimerLabelId");

		var selectUsageType = document.getElementById("selectUsageTypeId");
						
		//alert(navigator.userAgent);
		
		//added by Mike, 20260530
		answerInputLeft.addEventListener('keydown', (event) => {
			if (event.key==".") {
				const dotCount = answerInputLeft.value.split(".").length - 1; 

				if (dotCount>0) { //if there's more than 1 dot
					//no need to update the input text
					event.preventDefault(); 
				}
			}
		});

		//added by Mike, 20260530
		answerInputRight.addEventListener('keydown', (event) => {
			if (event.key==".") {
				const dotCount = answerInputRight.value.split(".").length - 1;

				if (dotCount>0) { //if there's more than 1 dot
					//no need to update the input text
					event.preventDefault(); 
				}
			}
		});
			
		if (/Mobile|Android|webOS|iPhone|iPad|iPod|AppleWebKit|BlackBerry|BB|PlayBook|IEMobile|Windows Phone|Kindle|Silk|Opera Mini/i.test(navigator.userAgent)) {

			//alert("detected: Mobile Browser!");
			
			var bIsMobile = true;

			//edited by Mike, 20260515; from 20260514
			if ((navigator.userAgent.includes("Macintosh")) || navigator.userAgent.includes("Mac")) {
				//var buttonEqualsButton = document.getElementById("buttonEqualsId");
			
				//isIpad via the number of touch points;
				if (navigator.maxTouchPoints > 1) {
					document.body.style.transform = "scale(1.4)";
					document.body.style.width = "80%";
					document.body.style.height = "80%";

					answerInputLeft.style.width = "280px";
					answerInputRight.style.width = "280px";

					//////reference; Google AI Overview
					//////push elements to the right
					////document.body.style.marginLeft = "auto";
					////document.body.style.marginRight = "0";

				}
				else {
					document.body.style.transform = "scale(0.8)";
					
					document.body.style.width = "100%";
					document.body.style.height = "100%";
				}
			}
			//Android mobile
			else {
				document.body.style.transform = "scale(1.6)";
				document.body.style.width = "100%";
				document.body.style.height = "100%";

				answerInputLeft.style.width = "4.2em";
				answerInputRight.style.width = "4.2em";		
				
				answerInputLeft.style.fontSize = "4rem";
				answerInputRight.style.fontSize = "4rem";
				
				unitLabelLeft.style.fontSize = "2rem";
				unitLabelRight.style.fontSize = "2rem";		

				selectUsageType.style.fontSize = "3rem";		
				
				disclaimerLabel.style.fontSize = "1.8rem";
			}
		}
		else {
			//alert("NOT MOBILE!!");
			document.body.style.transform = "scale(1.0)"; //0.8
			
			document.body.style.width = "100%";
			document.body.style.height = "100%";
		}

		//removed by Mike, 20260525; from 20260515
		//initKeyboardInput();
	}

	//added by Mike, 20260513
	function getPlacesAfterDecimalPoint(fInput) {
		sInput = fInput.toString();
		
		if (sInput.includes(".")) {
			return sInput.substring(sInput.indexOf(".")+1).length;
		}
		
		return 0;
	}
