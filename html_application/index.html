	function isParenthesis(sInput) {
		if (sInput.includes("(")) { 
			return true;
		}
		else if (sInput.includes(")")) { 
			return true;
		}

		return false;
	}
	
	//noted: TODO: -verify: if sInput is not an operator nor an operand;
	//example: using "*" instead of ×;
	function isOperator(sInput) {
		//alert ("HERE!!: "+sInput);

		if (sInput.includes("×")) { //*
			return true;	
		}
		else if (sInput.includes("+")) {
			return true;	
		}
		else if (sInput.includes("-")) {
			return true;	
		}
		else if (sInput.includes("÷")) { ///
			return true;	
		}
		else if (sInput.includes("(")) {
			return true;	
		}
		else if (sInput.includes(")")) {
			return true;	
		}

		//alert("END!!");
		
		return false;	
	}

		else if (sInput.includes(")")) {

		//alert("END!!");
		
		return false;	
	}

			}
*/

			if (answerInput.value=="0") {
				reset();
			}
		}

		//added by Mike, 20260430
		//only one "." can be added
		if ((digit==".") && (sCurrOperand.includes("."))) {
			return;
		}
		
		if (arrayOperator.at(-1)=="=") { //peek last element
			//edited by Mike, 20260501
/*
			sCurrOperand="";
			arrayOperator.pop();
			answerInput.value="";
			arrayOperator = [];
			arrayOperand = [];
*/		
			reset();
		}

		//added by Mike, 20260430
////		if (answerInput.value.length>10) {
////			//max 11 operands and operators including the decimal point 
		if (answerInput.value.length>12) {
			//max 13 operands and operators including the decimal point 
			return;
		}
		
		sCurrOperand=sCurrOperand.concat(digit);
		
		//alert(sCurrOperand);

		answerInput.value=answerInput.value.concat(digit);
		//alert(answerInput);
	}
